    - path: "artifacts/api-server/src/routes/bluej/j-config-service.ts"
      action: create
      reason: "Cached read/write service. Reads served from memory; writes bump version, append history, invalidate cache."
      full_content: |
        // Runtime hot-patch config service for B.L.U.E.-J.
        // DB-backed key/value config that changes live — no rebuild, no restart.
        // Reads are served from an in-memory cache (TTL-refreshed and invalidated on
        // every write), so a hot-patch takes effect on the very next request.
        import { db } from "@workspace/db";
        import { jConfig, jConfigHistory } from "@workspace/db";
        import { eq, desc } from "drizzle-orm";

        // Known, hot-patchable keys with safe defaults. getConfig falls back to these
        // when the DB has no row yet. Unknown DB keys are still served (see getConfig).
        export const CONFIG_DEFAULTS = {
          "chat.model.default": "gpt-5.2",
          "chat.model.byok": "gpt-4o",
          "chat.temperature.byok": "0.7",
          "chat.persona.suffix": "",
          "chat.workspace.maxChars": "15000",
          "safety.antiUltron.enabled": "true",
          "exec.timeoutMs": "10000",
          "exec.engine.preferred": "auto",
        } as const;

        export type ConfigKey = keyof typeof CONFIG_DEFAULTS;

        interface CacheEntry {
          value: string;
          version: number;
        }
        const cache = new Map<string, CacheEntry>();
        let cacheLoadedAt = 0;
        const CACHE_TTL_MS = 30_000;

        async function refreshCache(): Promise<void> {
          const rows = await db.select().from(jConfig);
          cache.clear();
          for (const r of rows) {
            cache.set(r.configKey, { value: r.configValue, version: r.version });
          }
          cacheLoadedAt = Date.now();
        }

        async function ensureCache(): Promise<void> {
          if (Date.now() - cacheLoadedAt > CACHE_TTL_MS) await refreshCache();
        }

        export async function getConfig(key: ConfigKey | string): Promise<string> {
          await ensureCache();
          const hit = cache.get(key);
          if (hit) return hit.value;
          return (CONFIG_DEFAULTS as Record<string, string>)[key] ?? "";
        }

        export async function getNumber(key: ConfigKey, fallback: number): Promise<number> {
          const n = Number(await getConfig(key));
          return Number.isFinite(n) ? n : fallback;
        }

        export async function getBool(key: ConfigKey): Promise<boolean> {
          return (await getConfig(key)).toLowerCase() === "true";
        }

        export async function getAll(): Promise<
          Array<{ key: string; value: string; version: number; isDefault: boolean }>
        > {
          await refreshCache();
          const keys = new Set<string>([...Object.keys(CONFIG_DEFAULTS), ...cache.keys()]);
          return [...keys]
            .map((k) => {
              const hit = cache.get(k);
              return {
                key: k,
                value: hit ? hit.value : (CONFIG_DEFAULTS as Record<string, string>)[k] ?? "",
                version: hit ? hit.version : 0,
                isDefault: !hit,
              };
            })
            .sort((a, b) => a.key.localeCompare(b.key));
        }

        export async function setConfig(
          key: string,
          value: string,
          changedBy = "admin",
        ): Promise<{ key: string; value: string; version: number }> {
          const existing = (
            await db.select().from(jConfig).where(eq(jConfig.configKey, key))
          )[0];
          const nextVersion = (existing?.version ?? 0) + 1;
          if (existing) {
            await db
              .update(jConfig)
              .set({ configValue: value, version: nextVersion, updatedAt: new Date() })
              .where(eq(jConfig.configKey, key));
          } else {
            await db
              .insert(jConfig)
              .values({ configKey: key, configValue: value, version: nextVersion });
          }
          await db
            .insert(jConfigHistory)
            .values({ configKey: key, configValue: value, version: nextVersion, changedBy });
          cache.set(key, { value, version: nextVersion }); // immediate invalidation
          return { key, value, version: nextVersion };
        }

        export async function deleteConfig(key: string): Promise<boolean> {
          await db.delete(jConfig).where(eq(jConfig.configKey, key));
          cache.delete(key);
          return true;
        }

        export async function getHistory(
          key: string,
          limit = 20,
        ): Promise<Array<{ value: string; version: number; changedBy: string; changedAt: Date }>> {
          const rows = await db
            .select()
            .from(jConfigHistory)
            .where(eq(jConfigHistory.configKey, key))
            .orderBy(desc(jConfigHistory.version))
            .limit(limit);
          return rows.map((r) => ({
            value: r.configValue,
            version: r.version,
            changedBy: r.changedBy,
            changedAt: r.changedAt,
          }));
        }

        export async function rollback(
          key: string,
          toVersion: number,
          changedBy = "admin",
        ): Promise<{ key: string; value: string; version: number } | null> {
          const target = (
            await db.select().from(jConfigHistory).where(eq(jConfigHistory.configKey, key))
          ).find((r) => r.version === toVersion);
          if (!target) return null;
          return setConfig(key, target.configValue, `${changedBy} (rollback->v${toVersion})`);
        }

    - path: "artifacts/api-server/src/routes/bluej/j-config.ts"
      action: create
      reason: "Admin-gated CRUD + history + rollback route for the hot-patch config."
      full_content: |
        import { Router, type IRouter, type Request, type Response, type NextFunction } from "express";
        import {
          getAll,
          setConfig,
          deleteConfig,
          getHistory,
          rollback,
          CONFIG_DEFAULTS,
        } from "./j-config-service.js";

        const router: IRouter = Router();

        const ADMIN_AGENT_PASSWORD = process.env.ADMIN_AGENT_PASSWORD || "";

        // Admin gate — reuses the same secret as Agent Mode unlock. Key travels in the
        // x-admin-key header and is never logged.
        function requireAdmin(req: Request, res: Response, next: NextFunction): void {
          if (!ADMIN_AGENT_PASSWORD) {
            res.status(503).json({ error: "Hot-patch disabled: ADMIN_AGENT_PASSWORD is not configured." });
            return;
          }
          const key = req.header("x-admin-key");
          if (!key || key !== ADMIN_AGENT_PASSWORD) {
            res.status(401).json({ error: "Unauthorized: valid admin key required." });
            return;
          }
          next();
        }

        router.use(requireAdmin);

        router.get("/", async (_req, res) => {
          res.json({ config: await getAll(), defaults: CONFIG_DEFAULTS });
        });

        router.put("/:key", async (req, res) => {
          const key = req.params.key;
          const { value } = req.body as { value?: unknown };
          if (typeof value !== "string") {
            res.status(400).json({ error: "Body must include a string 'value'." });
            return;
          }
          if (value.length > 8000) {
            res.status(400).json({ error: "Value too large (8KB limit)." });
            return;
          }
          const result = await setConfig(key, value, "admin");
          req.log.info({ key, version: result.version }, "j-config hot-patched");
          res.json(result);
        });

        router.delete("/:key", async (req, res) => {
          await deleteConfig(req.params.key);
          res.json({ key: req.params.key, deleted: true });
        });

        router.get("/:key/history", async (req, res) => {
          res.json({ key: req.params.key, history: await getHistory(req.params.key) });
        });

        router.post("/:key/rollback", async (req, res) => {
          const { version } = req.body as { version?: number };
          if (typeof version !== "number") {
            res.status(400).json({ error: "Body must include a numeric 'version'." });
            return;
          }
          const result = await rollback(req.params.key, version, "admin");
          if (!result) {
            res.status(404).json({ error: `No history entry for version ${version}.` });
            return;
          }
          res.json(result);
        });

        export default router;

