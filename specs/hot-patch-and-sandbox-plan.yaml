                   PYTHONDONTWRITEBYTECODE: "1",
                   PYTHONIOENCODING: "utf-8",
                   HOME: "/tmp",
                 },
               });
        notes:
          - "compile (g++/gcc) and run both flow through spawnProcess, so both are sandboxed; the per-run workdir TMP_DIR is the only writable path and persists across the separate compile/run calls because the bind targets the real host dir."
          - "checkSafety() is still called in prepareProgram() and execute.ts — kept as the pre-filter tier."
          - "EXEC_TIMEOUT_MS wall-clock SIGKILL stays as a second ceiling above prlimit --cpu."

      - path: "artifacts/api-server/src/routes/bluej/execute.ts"
        action: modify
        reason: "Report which sandbox engine actually ran the code so the UI/telemetry is honest."
        diff: |
          --- a/artifacts/api-server/src/routes/bluej/execute.ts
          +++ b/artifacts/api-server/src/routes/bluej/execute.ts
          @@
