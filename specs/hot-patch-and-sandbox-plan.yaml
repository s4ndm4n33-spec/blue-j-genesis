    - path: "artifacts/blue-j/src/components/JConfigPanel.tsx"
      action: create
      reason: "Admin UI to view/edit/rollback hot-patch config. Sends the unlock password as x-admin-key."
      full_content: |
        import { useEffect, useState, useCallback } from "react";

        interface ConfigRow {
          key: string;
          value: string;
          version: number;
          isDefault: boolean;
        }

        export function JConfigPanel({ adminKey }: { adminKey: string }) {
          const [rows, setRows] = useState<ConfigRow[]>([]);
          const [drafts, setDrafts] = useState<Record<string, string>>({});
          const [status, setStatus] = useState<string>("");
          const [loading, setLoading] = useState(false);

          const load = useCallback(async () => {
            setLoading(true);
            try {
              const resp = await fetch("/api/bluej/j-config", {
                headers: { "x-admin-key": adminKey },
              });
              if (!resp.ok) {
                setStatus(`Load failed (${resp.status}).`);
                return;
              }
              const data = await resp.json();
              setRows(data.config as ConfigRow[]);
              setStatus("");
            } catch {
              setStatus("Network error loading config.");
            } finally {
              setLoading(false);
            }
          }, [adminKey]);

          useEffect(() => {
            load();
          }, [load]);

          const save = async (key: string) => {
            const value = drafts[key] ?? rows.find((r) => r.key === key)?.value ?? "";
            const resp = await fetch(`/api/bluej/j-config/${encodeURIComponent(key)}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json", "x-admin-key": adminKey },
              body: JSON.stringify({ value }),
            });
            if (resp.ok) {
              const r = await resp.json();
              setStatus(`Patched ${key} → v${r.version} (live).`);
              setDrafts((d) => {
                const next = { ...d };
                delete next[key];
                return next;
              });
              load();
            } else {
              setStatus(`Save failed for ${key} (${resp.status}).`);
            }
          };

          return (
            <div className="h-full flex flex-col p-3 gap-2 overflow-y-auto font-mono text-xs">
              <div className="flex items-center justify-between">
