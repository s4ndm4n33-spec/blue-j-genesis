# ===========================================================================
# SUBSYSTEM 2 — CODE EXECUTOR: BLOCKLIST → TRUE SANDBOX
# ===========================================================================
sandbox_migration:
  goal: >-
    Make OS-level isolation — not a regex blocklist — the PRIMARY security boundary for
    executed student code. executor.ts's own header admits "This is NOT a full sandbox."
    Introduce a tiered engine: bubblewrap (best) → unshare+prlimit (util-linux fallback) →
    blocklist (last resort, fail-safe). The blocklist is demoted to a cheap pre-filter, not
    the boundary. grade.ts inherits the change for free (it runs through executor primitives).
  threat_model:
    - "Network exfiltration  → killed by network-namespace isolation (--unshare-net / unshare --net)."
    - "Fork bombs            → bounded by prlimit --nproc."
    - "Memory bombs          → bounded by prlimit --as (address space)."
    - "CPU/infinite loops    → bounded by prlimit --cpu AND the existing wall-clock SIGKILL timeout."
    - "Disk-fill             → bounded by prlimit --fsize + tmpfs /tmp."
    - "Host FS read/tamper   → blocked ONLY in the bwrap tier (read-only rootfs binds; only the per-run workdir writable). The unshare tier does NOT isolate the filesystem (no pivot_root / RO remount) — for true FS isolation require bwrap or option_b (external service)."

  option_a_in_container:
    summary: "OS namespaces + rlimits inside the existing container. Lowest latency, no external dependency. Requires unprivileged user namespaces on the host."
    system_dependency:
      package: "bubblewrap"
      why: "Tier-1 engine (bwrap). Verified ABSENT in the current environment — must be installed."
      how: >-
        Add bubblewrap as a system (Nix) dependency via the Replit package manager
        (package-management skill → installSystemDependencies / replit.nix pkgs.bubblewrap).
        util-linux (unshare/prlimit) is already present and powers the tier-2 fallback if
        bwrap cannot be installed.
      verify: "command -v bwrap  &&  bwrap --version"

    files:
      - path: "artifacts/api-server/src/routes/bluej/sandbox.ts"
        action: create
        reason: "Tiered sandbox engine: detect best available, build a wrapped argv with namespaces + rlimits."
        full_content: |
          // OS-level sandbox engine for B.L.U.E.-J. code execution.
          // Replaces the regex blocklist as the PRIMARY isolation boundary. The blocklist
          // in executor.ts is kept only as a cheap pre-filter (defense in depth); the real
          // guarantee now comes from OS namespaces + resource limits.
          //
          // Engine tiers (best available auto-selected, overridable via exec.engine.preferred):
          //   1. bwrap    — bubblewrap: net/pid/ipc/uts namespaces, read-only rootfs, tmpfs.
          //   2. unshare  — util-linux fallback: net/pid/mount/ipc/uts namespaces + rlimits.
          //               NOTE: does NOT remount root read-only — NO filesystem isolation.
          //   3. blocklist— last resort: no OS isolation, regex blocklist only (fail-safe).
          import { execFileSync } from "child_process";

          export type SandboxEngine = "bwrap" | "unshare" | "blocklist";

          export interface SandboxLimits {
            cpuSeconds: number; // hard CPU time (prlimit --cpu)
            addressSpaceMb: number; // max virtual memory (prlimit --as)
            maxProcs: number; // max processes/threads (prlimit --nproc)
            fileSizeMb: number; // max single-file write (prlimit --fsize)
          }

          export const DEFAULT_LIMITS: SandboxLimits = {
            cpuSeconds: 10,
            addressSpaceMb: 512,
            maxProcs: 64,
            fileSizeMb: 16,
          };

          function has(bin: string): boolean {
            try {
              execFileSync("sh", ["-c", `command -v ${bin}`], { stdio: "ignore" });
              return true;
            } catch {
              return false;
            }
          }

          let cachedEngine: SandboxEngine | null = null;

          // Real capability probe — not just binary presence. Unprivileged user
          // namespaces may be disabled by the host even when bwrap/unshare exist, so we
          // actually run the wrapper against `true` and demote on failure (fail-safe).
          function probe(engine: SandboxEngine): boolean {
            try {
              if (engine === "bwrap") {
                execFileSync("bwrap", ["--unshare-net", "--ro-bind", "/", "/", "--", "true"], { stdio: "ignore" });
                return true;
              }
              if (engine === "unshare") {
                execFileSync("unshare", ["--net", "--fork", "--map-root-user", "--", "true"], { stdio: "ignore" });
                return true;
              }
            } catch {
              return false;
            }
            return false;
          }

          export function detectEngine(preferred = "auto"): SandboxEngine {
            if (preferred === "bwrap" || preferred === "unshare" || preferred === "blocklist") {
              return preferred;
            }
            if (cachedEngine) return cachedEngine;
            if (has("bwrap") && probe("bwrap")) cachedEngine = "bwrap";
            else if (has("unshare") && has("prlimit") && probe("unshare")) cachedEngine = "unshare";
            else cachedEngine = "blocklist";
            return cachedEngine;
          }

          function prlimitPrefix(l: SandboxLimits): string[] {
            return [
              "prlimit",
              `--cpu=${l.cpuSeconds}`,
              `--as=${l.addressSpaceMb * 1024 * 1024}`,
              `--nproc=${l.maxProcs}`,
              `--fsize=${l.fileSizeMb * 1024 * 1024}`,
              "--",
            ];
          }

          function bwrapPrefix(workdir: string): string[] {
            return [
              "bwrap",
              "--unshare-net", "--unshare-pid", "--unshare-ipc", "--unshare-uts",
              "--unshare-cgroup-try",
              "--new-session", "--die-with-parent",
              "--proc", "/proc", "--dev", "/dev",
              "--ro-bind", "/nix", "/nix",
              "--ro-bind-try", "/usr", "/usr",
              "--ro-bind-try", "/bin", "/bin",
              "--ro-bind-try", "/lib", "/lib",
              "--ro-bind-try", "/lib64", "/lib64",
              "--tmpfs", "/tmp",
              "--bind", workdir, workdir, // layered over tmpfs /tmp; must come AFTER --tmpfs
              "--chdir", workdir,
              "--setenv", "HOME", "/tmp",
              "--setenv", "PYTHONDONTWRITEBYTECODE", "1",
              "--setenv", "PYTHONIOENCODING", "utf-8",
              "--",
            ];
          }

          function unsharePrefix(): string[] {
            return [
              "unshare",
              "--net", "--pid", "--ipc", "--uts", "--mount",
              "--fork", "--kill-child", "--map-root-user",
              "--",
            ];
          }

          // Wrap a real command into a sandboxed argv. Returns the binary to spawn plus its
          // argument vector; executor.ts spawns the result directly. rlimits are applied as the
          // outermost prefix so they are inherited by the namespaced child across exec/fork.
          export function wrapCommand(
            engine: SandboxEngine,
            cmd: string,
            args: string[],
            opts: { workdir: string; limits?: SandboxLimits },
          ): { file: string; argv: string[] } {
            const limits = opts.limits ?? DEFAULT_LIMITS;
            if (engine === "bwrap") {
              const full = [...prlimitPrefix(limits), ...bwrapPrefix(opts.workdir), cmd, ...args];
              return { file: full[0], argv: full.slice(1) };
            }
            if (engine === "unshare") {
              const full = [...prlimitPrefix(limits), ...unsharePrefix(), cmd, ...args];
              return { file: full[0], argv: full.slice(1) };
            }
            // blocklist: no OS isolation — caller MUST have run checkSafety() first.
            return { file: cmd, argv: args };
          }

      - path: "artifacts/api-server/src/routes/bluej/executor.ts"
        action: modify
        reason: "Route every spawn through the sandbox engine; demote the blocklist to a pre-filter; expose the active engine."
        diff: |
          --- a/artifacts/api-server/src/routes/bluej/executor.ts
          +++ b/artifacts/api-server/src/routes/bluej/executor.ts
          @@
          -// ─── Shared code execution primitives for B.L.U.E.-J. ────────────────────────
          -// Single source of truth for the sandbox safety blocklist + runner so that the
          -// /execute endpoint and the /grade endpoint can never diverge in what they
          -// allow. This is NOT a full sandbox — it's a best-effort layer for beta. For
          -// public launch, swap the executor for a proper isolation service.
          +// ─── Shared code execution primitives for B.L.U.E.-J. ────────────────────────
          +// Single source of truth for the runner so /execute and /grade can never diverge.
          +// The PRIMARY isolation boundary is OS-level sandboxing (see sandbox.ts): network/
          +// pid/ipc/uts namespaces + rlimits via bubblewrap, falling back to unshare+prlimit.
          +// The regex blocklist below is a cheap PRE-FILTER (defense in depth), not the
          +// boundary. If no OS sandbox is available the engine fails safe to blocklist-only.
           import { spawn } from "child_process";
           import { writeFile, unlink, mkdir } from "fs/promises";
           import { join } from "path";
           import { randomUUID } from "crypto";
           import { existsSync } from "fs";
          +import { detectEngine, wrapCommand, DEFAULT_LIMITS, type SandboxEngine } from "./sandbox.js";
          +
          +// The engine actually in use this process (resolved once, overridable via env).
          +export function activeEngine(): SandboxEngine {
