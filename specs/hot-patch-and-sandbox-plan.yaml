# ROLLOUT — apply in this order
# ===========================================================================
rollout:
  - step: 1
    subsystem: hot_patch_system
    action: "Add jConfigHistory + barrel export; run `pnpm --filter @workspace/db run push --force`."
  - step: 2
    subsystem: hot_patch_system
    action: "Add j-config-service.ts + j-config.ts; mount in index.ts; verify auth (401/503) and CRUD via curl."
  - step: 3
    subsystem: hot_patch_system
    action: "Wire chat.ts (model/temp/persona/workspace) + j-personality.ts JContext; verify a live model/persona patch."
  - step: 4
    subsystem: hot_patch_system
    action: "Add agent.ts config_* tools + frontend JConfigPanel/AgentModePanel; verify J. can self-patch live."
  - step: 5
    subsystem: sandbox_migration
    action: "Add sandbox.ts; install bubblewrap; wire executor.ts spawnProcess + boot log; confirm boot log reports 'bwrap'."
  - step: 6
    subsystem: sandbox_migration
    action: "Update execute.ts engine reporting; run the threat-model verification matrix (net/fork/mem/cpu/disk)."
  - step: 7
    subsystem: sandbox_migration
    action: "If boot log shows 'blocklist' (userns unavailable), implement option_b (piston.ts) and set PISTON_URL."
  - step: 8
    both: true
    action: "Run `pnpm -w typecheck` (or per-package tsc); architect review (code_review skill); checkpoint."

acceptance_criteria:
  hot_patch_system:
    - "A config change via PUT (or J.'s config_set) alters the next chat request with NO rebuild/restart."
    - "All j-config routes reject requests without the correct x-admin-key."
    - "Rollback restores a prior version and is reflected on the next request."
    - "tsc clean across api-server, blue-j, and db."
  sandbox_migration:
    - "Boot log reports a non-blocklist engine (bwrap or unshare) in this environment, OR option_b is active."
    - "Network egress from executed code is blocked at the OS layer (not merely by regex)."
    - "Fork/memory/cpu/disk bombs are bounded by rlimits and cannot destabilize the API server."
    - "grade.ts requires zero changes and runs under the same sandbox (verified by a graded CODE submission)."
    - "checkSafety remains as a pre-filter; removing the OS sandbox degrades safely to the prior protection level."
