spec_version: "1.0"
title: "B.L.U.E.-J. — Hot-Patch Self-Modification & Code Executor Sandbox Migration"
author: "fable 5"
created: "2026-06-13T19:31:35Z"
status: "proposed"
machine_readable: true
notes: >-
  This is an implementation specification, not applied code. Every diff is a real,
  complete change against the current source (no stubs, no placeholders). Apply in the
  order given by `rollout`. Two independent subsystems are specified:
  (1) hot_patch_system — wire the unused j_config table into a live runtime-config
  system so J. / an admin can change behaviour with NO rebuild or restart; and
  (2) sandbox_migration — replace the regex blocklist as the PRIMARY isolation
  boundary with OS-level sandboxing (bubblewrap → unshare → blocklist fallback),
  with an external-isolation-service escalation path.

review_notes:
  reviewed_by: "architect (code_review) on 2026-06-13"
  resolved:
    - "Agent config tools (config_get/set/history) are now gated SERVER-SIDE via x-admin-key === ADMIN_AGENT_PASSWORD in agent.ts. /api/bluej/agent is otherwise unauthenticated (unlock only returns a boolean to the client), so UI-only gating was insufficient."
    - "Loose diff hunks for chat.ts and agent.ts tightened to real anchored unified hunks (agent.ts dispatch is a switch, not else-if)."
    - "Sandbox honesty: the unshare tier provides process/network/resource isolation but NOT filesystem isolation; threat_model and engine comments corrected. detectEngine now runs a real capability probe (userns may be disabled even when the binary exists) and fails safe to the next tier."
    - "Piston (option_b) now short-circuits BEFORE prepareProgram in grade.ts/execute.ts, so C/C++ never compiles or runs on-host when an external service is configured."
  verified_false_positive:
    - "Architect claimed grade.ts leaks quiz answer keys (it inspected only gradeQuiz, line 132). Verified the POST handler strips correctOptionId/explanation at lines 249-256 unless (mastered || question.passed). The Session 11 migration-log claim is therefore ACCURATE and was left unchanged."

environment_assumptions:
  monorepo: "pnpm v10+ workspace"
  backend: "artifacts/api-server — Express 5 + Drizzle ORM (PostgreSQL), ESM (.js import specifiers)"
  frontend: "artifacts/blue-j — React 19 + Vite + Zustand + TanStack Query"
  db_lib: "lib/db — Drizzle schema barrel at lib/db/src/schema/index.ts; drizzle-zod + zod/v4 available"
  secret_available: "ADMIN_AGENT_PASSWORD (already used by Agent Mode unlock in agent.ts)"
  toolchain_present: ["unshare", "prlimit", "setpriv"]   # util-linux, verified present
  toolchain_absent: ["bwrap", "nsjail", "firejail"]      # verified absent — must be installed for tier-1
  hard_constraint: "Replit does NOT support Docker/containers; isolation must work in-container or via a remote service."
  userns_caveat: >-
    Both bwrap and unshare require unprivileged user namespaces (CONFIG_USER_NS) to be
    permitted by the host. If the host forbids them, tier-1/tier-2 will fail at runtime;
    the engine MUST fail safe to the blocklist tier and log loudly. When OS namespaces are
    unavailable, use sandbox_migration.option_b (external isolation service) for a true boundary.

# ===========================================================================
# SUBSYSTEM 1 — HOT-PATCH SELF-MODIFICATION (runtime config, no rebuild)
# ===========================================================================
hot_patch_system:
  goal: >-
    Let J. (in Agent Mode) and an admin change runtime behaviour — model, temperature,
    persona directive, workspace size, safety toggle, exec timeout, exec engine — WITHOUT
    editing source and waiting for a rebuild/restart. agent.ts already has self_write, but
    its own manifest admits "changes take effect after the next server build+restart." This
    closes that gap: config lives in the existing (currently unwired) j_config table, is read
    through a cached service, and a write takes effect on the very next request.
  design:
    storage: "Existing jConfig table (key/value/version/updatedAt). Add a jConfigHistory table for versioned rollback."
    caching: "In-memory Map in the service, TTL-refreshed (30s) and invalidated immediately on every write."
    auth: "x-admin-key header compared to ADMIN_AGENT_PASSWORD (same secret as Agent unlock). 503 if secret unset; 401 if mismatch."
    typed_defaults: "CONFIG_DEFAULTS in the service is the source of truth for known keys + safe fallbacks; unknown DB keys are still served."
    self_modification: "agent.ts gains config_get / config_set / config_history tools so J. can hot-patch itself live."

  files:
    - path: "lib/db/src/schema/index.ts"
