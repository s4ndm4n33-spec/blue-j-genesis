        +import { pgTable, text, integer, timestamp } from "drizzle-orm/pg-core";
        +import { createInsertSchema } from "drizzle-zod";
        +import { z } from "zod/v4";

         export const jConfig = pgTable("j_config", {
           id: integer("id").primaryKey().generatedAlwaysAsIdentity(),
           configKey: text("config_key").notNull().unique(),
           configValue: text("config_value").notNull(),
           description: text("description"),
           version: integer("version").notNull().default(1),
           updatedAt: timestamp("updated_at").notNull().defaultNow(),
         });

        +// Append-only audit trail: one row per write, enabling versioned rollback.
        +export const jConfigHistory = pgTable("j_config_history", {
        +  id: integer("id").primaryKey().generatedAlwaysAsIdentity(),
        +  configKey: text("config_key").notNull(),
        +  configValue: text("config_value").notNull(),
        +  version: integer("version").notNull(),
        +  changedBy: text("changed_by").notNull().default("admin"),
