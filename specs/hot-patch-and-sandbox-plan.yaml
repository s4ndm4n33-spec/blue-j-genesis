             checkSafety,
             ensureTmpDir,
             spawnProcess,
             TMP_DIR,
             PYTHON_BIN,
             GPP_BIN,
             GCC_BIN,
             NODE_BIN,
          +  activeEngine,
           } from "./executor.js";
          @@
          -      const r = await spawnProcess(PYTHON_BIN, [f]);
          +      const r = await spawnProcess(PYTHON_BIN, [f]);
                 await unlink(f).catch(() => {});
          -      res.json({ ...r, phase: "run", engine: "server" });
          +      res.json({ ...r, phase: "run", engine: activeEngine() });
        notes:
          - "Apply the same engine:'server' → engine:activeEngine() rename to the javascript, cpp, and c run-result res.json() calls. Leave gcode (validate/simulator) untouched."

      - path: "artifacts/api-server/src/routes/bluej/grade.ts"
        action: none
        reason: "No change required — grade.ts grades via prepareProgram/runPrepared/spawnProcess from executor.ts, so it inherits OS sandboxing automatically. This is the payoff of the shared-executor refactor (Session 11, T001)."

    boot_log:
      file: "artifacts/api-server/src/index.ts (or app.ts startup)"
      add: |
        // After the server starts listening:
        import { activeEngine } from "./routes/bluej/executor.js";
        logger.info({ sandboxEngine: activeEngine() }, "B.L.U.E.-J. code sandbox engine selected");
      why: "Make the active isolation tier visible at boot. If it logs 'blocklist', OS namespaces are unavailable and option_b should be used before any public/untrusted launch."

    verification:
      - "Network blocked: run `import urllib.request; urllib.request.urlopen('http://example.com')` → connection error inside sandbox (not the blocklist message)."
      - "Fork bomb bounded: a Python multiprocessing fork loop hits the --nproc ceiling instead of taking the host down."
      - "Memory bomb bounded: `x = ' ' * (10**9)` → MemoryError / killed at --as limit, not OOM-killing the server."
      - "CPU bound: `while True: pass` → killed at prlimit --cpu (~10s) or the wall-clock SIGKILL, whichever first."
      - "Disk bound: writing a >16MB file → fails at --fsize."
      - "Engine honesty: GET execute response `engine` field reads 'bwrap' (or 'unshare'); boot log matches."

    risks_and_caveats:
      - "USERNS dependency: if the host disallows unprivileged user namespaces, bwrap/unshare fail to start; detectEngine still returns the tier but the spawn errors. HARDENING: probe at boot (run `bwrap --ro-bind / / true`) and demote cachedEngine to 'blocklist' on failure so the app degrades safely instead of erroring every run."
      - "bwrap mount order: --tmpfs /tmp MUST precede --bind <workdir> <workdir> or the workdir is masked. Encoded in bwrapPrefix order."
      - "First-run latency: bwrap adds a few ms per spawn; negligible vs compile time."
      - "Do NOT remove checkSafety — keeping it as a pre-filter means even the blocklist fallback retains the old protection level."

  option_b_external_service:
    summary: >-
      If in-container namespaces are unavailable (userns disabled) OR you want the strongest
      boundary before a public, untrusted launch, offload execution to a dedicated isolation
      service. This is the 'proper isolation service' the original executor header anticipated.
    choices:
      - "Self-hosted Piston (engineer-man/piston) — language sandbox with built-in run/compile timeouts and resource caps."
      - "Judge0 CE — REST execution sandbox with per-submission cpu/memory/wall limits."
    integration:
      - path: "artifacts/api-server/src/routes/bluej/piston.ts"
        action: create
        reason: "Thin client that offloads a run to a Piston-compatible endpoint and normalizes to RunResult."
        full_content: |
          // External isolation client (Piston-compatible). Strongest boundary: code never
          // executes in our process/host — it runs in the sandbox service. Returns the same
          // RunResult shape as the in-container runner so executor callers are unchanged.
          import type { RunResult } from "./executor.js";

          const PISTON_URL = process.env.PISTON_URL || ""; // e.g. https://piston.internal/api/v2
          const VERSIONS: Record<string, { language: string; version: string; ext: string }> = {
            python: { language: "python", version: "3.12.0", ext: "py" },
            javascript: { language: "javascript", version: "20.11.1", ext: "js" },
            cpp: { language: "c++", version: "12.2.0", ext: "cpp" },
            c: { language: "c", version: "12.2.0", ext: "c" },
          };

          export function pistonAvailable(): boolean {
            return PISTON_URL.length > 0;
          }

          export async function pistonRun(
            language: string,
            code: string,
            opts: { stdin?: string; timeoutMs?: number } = {},
          ): Promise<RunResult> {
            const v = VERSIONS[language];
            if (!v) {
              return { stdout: "", stderr: `Unsupported language for Piston: ${language}`, exitCode: -1, runtimeMs: 0, timedOut: false };
            }
            const start = Date.now();
            const resp = await fetch(`${PISTON_URL}/execute`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                language: v.language,
                version: v.version,
                files: [{ name: `main.${v.ext}`, content: code }],
                stdin: opts.stdin ?? "",
                run_timeout: opts.timeoutMs ?? 10000,
                compile_timeout: 10000,
                run_memory_limit: 512 * 1024 * 1024,
              }),
            });
            if (!resp.ok) {
              return { stdout: "", stderr: `Piston error ${resp.status}`, exitCode: -1, runtimeMs: Date.now() - start, timedOut: false };
            }
            const data = (await resp.json()) as {
              run?: { stdout?: string; stderr?: string; code?: number; signal?: string };
              compile?: { stderr?: string; code?: number };
            };
            if (data.compile && data.compile.code && data.compile.code !== 0) {
              return { stdout: "", stderr: data.compile.stderr ?? "Compilation failed", exitCode: data.compile.code, runtimeMs: Date.now() - start, timedOut: false };
            }
            const run = data.run ?? {};
            return {
              stdout: (run.stdout ?? "").trim(),
              stderr: (run.stderr ?? "").trim(),
              exitCode: run.code ?? -1,
              runtimeMs: Date.now() - start,
              timedOut: run.signal === "SIGKILL",
            };
          }
      - path: "artifacts/api-server/src/routes/bluej/execute.ts"
        action: modify
        reason: "Short-circuit to the external service BEFORE any local file write/compile, so code never touches this host."
        diff: |
          --- a/artifacts/api-server/src/routes/bluej/execute.ts
          +++ b/artifacts/api-server/src/routes/bluej/execute.ts
          @@ import block
          +import { pistonAvailable, pistonRun } from "./piston.js";
          @@ after the supported-language + checkSafety() guards, BEFORE ensureTmpDir()/writeFile:
          +  // Strongest boundary: if an external isolation service is configured, run there.
          +  // Done BEFORE prepareProgram/writeFile so nothing executes or compiles locally.
          +  if (pistonAvailable() && ["python", "javascript", "cpp", "c"].includes(language)) {
          +    const r = await pistonRun(language, code);
          +    res.json({ ...r, phase: "run", engine: "piston" });
          +    return;
          +  }
        notes:
          - "gcode is descriptive validation only and stays local — not routed to Piston."
      - path: "artifacts/api-server/src/routes/bluej/grade.ts"
        action: modify
        reason: "Grade code against the external service BEFORE prepareProgram so C/C++ never compiles on-host."
        diff: |
          --- a/artifacts/api-server/src/routes/bluej/grade.ts
          +++ b/artifacts/api-server/src/routes/bluej/grade.ts
          @@ import block
          +import { pistonAvailable, pistonRun } from "./piston.js";
          @@ at the very top of gradeCode(), before `const prepared = await prepareProgram(language, code);`:
             const totalPoints = totalPointsFor(assessment);
          +  if (pistonAvailable()) {
          +    const cases: CaseResult[] = [];
          +    let passedPoints = 0, testsPassed = 0;
          +    for (const c of assessment.cases) {
          +      const run = await pistonRun(language, code, { stdin: c.stdin, timeoutMs: PER_CASE_TIMEOUT_MS });
          +      const passed = run.exitCode === 0 && !run.timedOut && norm(run.stdout) === norm(c.expectedStdout);
          +      if (passed) { passedPoints += c.points; testsPassed += 1; }
          +      const result: CaseResult = { id: c.id, passed, points: c.points, hidden: !!c.hidden };
          +      if (!c.hidden) { result.stdin = c.stdin; result.expected = norm(c.expectedStdout); result.got = norm(run.stdout); }
          +      cases.push(result);
          +    }
          +    return { passedPoints, totalPoints, testsPassed, cases };
          +  }
             const prepared = await prepareProgram(language, code);
        notes:
          - "When PISTON_URL is unset, behaviour is identical to option_a (local tiered sandbox). The quiz answer-key gating in the POST handler is unaffected."
    config:
      env: "PISTON_URL — base URL of the execution service (set via environment-secrets skill). Unset = disabled."
    tradeoffs:
      - "Strongest isolation (separate host/jail), survives userns being disabled."
      - "Adds network egress to the service + per-call latency; introduces an ops dependency."
      - "Hot-patchable: exec.engine.preferred + PISTON_URL let you switch boundaries without a redeploy."

