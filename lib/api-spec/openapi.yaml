openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat and audio operations
  - name: bluej
    description: B.L.U.E.-J. simulator operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /openai/conversations/{id}/voice-messages:
    post:
      operationId: sendOpenaiVoiceMessage
      tags: [openai]
      summary: Send audio and receive a streaming voice response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiVoiceMessageBody"
      responses:
        "200":
          description: SSE stream of transcript and audio chunks
          content:
            text/event-stream: {}
  /bluej/progress:
    get:
      operationId: getProgress
      tags: [bluej]
      summary: Get user progress through curriculum phases
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgress"
  /bluej/progress/task:
    post:
      operationId: completeTask
      tags: [bluej]
      summary: Mark a curriculum task as complete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTaskBody"
      responses:
        "200":
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgress"
  /bluej/tts:
    post:
      operationId: textToSpeech
      tags: [bluej]
      summary: Convert text to J.'s voice audio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TtsRequestBody"
      responses:
        "200":
          description: Base64 audio data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TtsResponse"
  /bluej/chat:
    post:
      operationId: chatWithJ
      tags: [bluej]
      summary: Send a message to J. and receive streaming response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatWithJBody"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    SendOpenaiVoiceMessageBody:
      type: object
      properties:
        audio:
          type: string
          description: Base64-encoded audio data
      required:
        - audio
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    UserProgress:
      type: object
      properties:
        sessionId:
          type: string
        currentPhase:
          type: integer
        currentTask:
          type: integer
        completedTasks:
          type: array
          items:
            type: string
        selectedLanguage:
          type: string
        selectedOs:
          type: string
        conversationId:
          type: integer
          nullable: true
      required:
        - sessionId
        - currentPhase
        - currentTask
        - completedTasks
        - selectedLanguage
        - selectedOs
    CompleteTaskBody:
      type: object
      properties:
        sessionId:
          type: string
        phaseIndex:
          type: integer
        taskIndex:
          type: integer
        language:
          type: string
        os:
          type: string
        conversationId:
          type: integer
          nullable: true
      required:
        - sessionId
        - phaseIndex
        - taskIndex
        - language
        - os
    TtsRequestBody:
      type: object
      properties:
        text:
          type: string
        voice:
          type: string
      required:
        - text
    TtsResponse:
      type: object
      properties:
        audio:
          type: string
          description: Base64-encoded audio
        format:
          type: string
      required:
        - audio
        - format
    ChatWithJBody:
      type: object
      properties:
        sessionId:
          type: string
        message:
          type: string
        conversationId:
          type: integer
          nullable: true
        language:
          type: string
        os:
          type: string
        phaseIndex:
          type: integer
        taskIndex:
          type: integer
        hardwareInfo:
          type: object
          properties:
            cpuCores:
              type: integer
              nullable: true
            ramGb:
              type: number
              nullable: true
            platform:
              type: string
              nullable: true
        repoContext:
          type: string
          nullable: true
      required:
        - sessionId
        - message
        - language
        - os
        - phaseIndex
        - taskIndex
